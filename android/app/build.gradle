// ─────────────────────────────────────────────────────────────────────────────
// android/app/build.gradle  —  Construction Manager
// Flutter 3.22+ / AGP 8.1.0 / Gradle 8.3 / Kotlin 1.9.22
// Plugins declared in settings.gradle (declarative block) — no deprecation warnings.
// ─────────────────────────────────────────────────────────────────────────────

plugins {
    id "com.android.application"
    id "dev.flutter.flutter-gradle-plugin"
    id "org.jetbrains.kotlin.android"
}

// ── Read local.properties (auto-generated by Flutter / Codemagic) ─────────────
def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader -> localProperties.load(reader) }
}
def flutterVersionCode = localProperties.getProperty('flutter.versionCode') ?: '1'
def flutterVersionName = localProperties.getProperty('flutter.versionName') ?: '1.0.0'

// ── Read key.properties (written by Codemagic or local dev — never committed) ─
//    Codemagic writes this file in the "Set up key.properties" build step.
//    key.properties must have all four keys non-empty to be considered valid.
def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
def hasKeystore = false
if (keystorePropertiesFile.exists()) {
    keystorePropertiesFile.withReader('UTF-8') { reader -> keystoreProperties.load(reader) }
    def sf = keystoreProperties.getProperty('storeFile', '').trim()
    def ka = keystoreProperties.getProperty('keyAlias',  '').trim()
    def kp = keystoreProperties.getProperty('keyPassword',   '')
    def sp = keystoreProperties.getProperty('storePassword', '')
    hasKeystore = sf && ka && kp && sp
}

android {
    namespace  "com.construction.management.app"
    compileSdk  34
    ndkVersion  flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
    kotlinOptions {
        jvmTarget = '1.8'
    }
    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    // ── Signing — only define release signingConfig when keystore is fully set ──
    if (hasKeystore) {
        signingConfigs {
            release {
                storeFile     file(keystoreProperties.getProperty('storeFile').trim())
                storePassword keystoreProperties.getProperty('storePassword')
                keyAlias      keystoreProperties.getProperty('keyAlias').trim()
                keyPassword   keystoreProperties.getProperty('keyPassword')
            }
        }
    }

    defaultConfig {
        applicationId   "com.construction.management.app"
        minSdk           21
        targetSdk        34
        versionCode      flutterVersionCode.toInteger()
        versionName      flutterVersionName
        multiDexEnabled  true
    }

    buildTypes {
        release {
            // Falls back to debug signing when no keystore provided (safe for CI test builds)
            signingConfig hasKeystore ? signingConfigs.release : signingConfigs.debug
            minifyEnabled   false
            shrinkResources false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
        debug {
            debuggable true
        }
        profile {
            initWith debug
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.22"
    implementation 'androidx.multidex:multidex:2.0.1'
}
